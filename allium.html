<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>who are you?</title> <style>

        body { background-color: black; color: white; font-family: 'VT323', monospace; text-align: center; margin-top: 50px;}
        .hidden-left { position: fixed; left: 0; top: 0; bottom: 0; width: 10vw; cursor: pointer; }

    <a class="black-link" id="rememberLink">remember</a>

    <script>
        document.getElementById('alliumImg').addEventListener('click', function() {
            document.getElementById('strum').play();
        });

        document.getElementById('rememberLink').addEventListener('click', function() {
            const pages = ['remember-yourself.html', 'remember-thiscode.html', 'remember-song.html']; const randomPage = pages[Math.floor(Math.random() * pages.length)];
            window.location.href = randomPage;
        });
